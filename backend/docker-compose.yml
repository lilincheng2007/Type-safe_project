services:
  postgres:
    image: postgres:16-alpine
    environment:
      # 与 DatabaseConfig 默认一致；应用连本机 5432 时一般无需再设 DB_USER
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # 默认连接库；各服务使用 delivery_user / delivery_order / … 见 docker/init-databases.sql
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - delivery_pg_data:/var/lib/postgresql/data
      # 使用 .sql 由镜像内 psql 执行，避免挂载 .sh 在部分环境下 shebang/权限导致 126 退出
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro

volumes:
  delivery_pg_data:
